<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Mi Blog</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Tu CSS personalizado -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navbar (igual que en index) -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    
        <!-- Caja contenedora -->
        <div class="container">
                
            <!--link al blog -->
            <a class="navbar-brand" href="index.html">Mi Blog</a>

                <!--<ul> = Unordered List = lista desordenada-->

                <!--Lista de links-->
                <ul class="navbar-nav">

                    <!--LI: List Item-->

                    <!--LI acerca de mi-->
                    <li class="nav-item">
    
                        <a class="nav-link" href="about.html">Acerca de mí</a>
                    </li>

                    <!--LI contacto-->
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contacto</a>
                    </li>

                </ul>


            </div>
        </div>
    </nav>



    
    <!-- Formulario de contacto -->
    <main class="container my-4">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">Contáctame</h2>
                        
                        <form>
                            <!-- Campo Nombre -->
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre completo *</label>
                                <input type="text" class="form-control" id="nombre" required>
                            </div>
                            
                            <!-- Campo Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo electrónico *</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            
                            <!-- Campo Teléfono -->
                            <div class="mb-3">
                                <label for="telefono" class="form-label">Teléfono</label>
                                <input type="tel" class="form-control" id="telefono">
                            </div>
                            
                            <!-- Campo Mensaje -->
                            <div class="mb-3">
                                <label for="mensaje" class="form-label">Mensaje * (mínimo 10 caracteres)</label>
                                <textarea class="form-control" id="mensaje" rows="5" required minlength="10"></textarea>
                            </div>
                            
                            <!-- Botón enviar -->
                            <div class="text-center">
                                <button  class="btn btn-primary">Enviar mensaje</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    
    <!-- Footer -->
    <footer class="bg-body-tertiary text-center py-3 mt-4">
        <div class="container">
            <p class="mb-2">Puedes encontrarme en</p>
            <a href="mailto:misaelgabrielcasagrande@gmail.com" type="email" class="text-decoration-none me-2">correo</a>
            <a href="tel:+5492901584401" class="text-decoration-none me-2">Telefono</a>
            <a href="https://www.instagram.com/misa_casagrande" class="text-decoration-none me-2">Instagram</a>
        </div>
    </footer>

</body>
</html>
